name: Validate Markdown & Links

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  markdown-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install markdownlint
        run: npm install -g markdownlint-cli

      - name: Run markdownlint
        run: markdownlint '**/*.md' --ignore node_modules --ignore .github

  link-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check links in README.md and SKILL.md
        uses: UmbrellaCookie/markdown-link-check@v1
        with:
          folder-path: .
          file-extension: .md
          use-verbose: true
          config: |
            {
              "ignorePatterns": [
                { "pattern": "^https://gaokao\\.chsi\\.com\\.cn" },
                { "pattern": "^https://sun\\.cn" },
                { "pattern": "^https://github\\.com/GZgreywolfy" },
                { "pattern": "^http://localhost" },
                { "pattern": "^file://" }
              ],
              "timeout": "10s",
              "retryOn429": true,
              "retryCount": 2,
              "fallbackRetryDelay": "30s"
            }